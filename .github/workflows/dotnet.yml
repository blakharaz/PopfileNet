# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
    paths-ignore: [ 'README.md' ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore

  test-unit:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Install dotnet-coverage
      run: dotnet tool install -g dotnet-coverage
    - name: Restore
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Unit Tests
      run: dotnet test PopfileNet.sln --no-build --filter "FullyQualifiedName~.UnitTests." --settings Tests/UnitTests/coverlet.runsettings --logger "console;verbosity=minimal" --results-directory ./TestResults/UnitTests
    - name: Merge coverage files
      run: |
        dotnet-coverage merge "TestResults/UnitTests/**/*.cobertura.xml" -o TestResults/UnitTests/merged.cobertura.xml --output-format cobertura
    - name: Upload unit coverage
      uses: actions/upload-artifact@v5
      with:
        name: coverage-unit
        path: TestResults/UnitTests/merged.cobertura.xml

  test-integration:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Restore
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Integration Tests
      run: dotnet test Tests/IntegrationTests/PopfileNet.IntegrationTests.csproj --no-build --settings Tests/IntegrationTests/coverlet.runsettings --logger "console;verbosity=minimal" --results-directory ./TestResults/IntegrationTests
    - name: Upload integration coverage
      uses: actions/upload-artifact@v5
      with:
        name: coverage-integration
        path: TestResults/IntegrationTests/

  test-functional:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Restore
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Install Playwright browsers
      run: |
        npm install -g playwright
        npx playwright install chromium
    - name: Functional Tests
      run: dotnet test Tests/FunctionalTests/PopfileNet.FunctionalTests.csproj --no-build --settings Tests/FunctionalTests/coverlet.runsettings --logger "console;verbosity=minimal" --results-directory ./TestResults/FunctionalTests
    - name: Upload functional coverage
      uses: actions/upload-artifact@v5
      if: always()
      with:
        name: coverage-functional
        path: TestResults/FunctionalTests/

  coverage-report:
    needs: [test-unit, test-integration, test-functional]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Download unit coverage
      uses: actions/download-artifact@v5
      with:
        name: coverage-unit
        path: ./coverage-unit
    - name: Download integration coverage
      uses: actions/download-artifact@v5
      with:
        name: coverage-integration
        path: ./coverage-integration
    - name: Download functional coverage
      uses: actions/download-artifact@v5
      with:
        name: coverage-functional
        path: ./coverage-functional
    - name: Generate unit coverage report
      if: hashFiles('./coverage-unit/merged.cobertura.xml')
      run: |
        dotnet tool install --global dotnet-reportgenerator-globaltool
        reportgenerator -reports:'./coverage-unit/merged.cobertura.xml' -targetdir:coveragereport-unit -reporttypes:'Cobertura'
    - name: Code Coverage Summary (Unit Tests Only)
      if: hashFiles('./coverage-unit/merged.cobertura.xml')
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: ./coverage-unit/merged.cobertura.xml
        badge: true
        fail_below_min: true
        format: markdown
        hide_branch_rate: false
        hide_complexity: true
        indicators: true
        output: both
        thresholds: '50 70'
    - name: Upload unit coverage for PR
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v5
      with:
        name: coverage
        path: ./coverage-unit/
    - name: Upload integration coverage reports
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: coverage-integration-reports
        path: |
          ./coverage-integration/
          ./coveragereport-integration/
    - name: Upload functional coverage reports
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: coverage-functional-reports
        path: |
          ./coverage-functional/
          ./coveragereport-functional/

  comment-pr:
    needs: coverage-report
    if: always() && github.event_name == 'pull_request'
    permissions:
      actions: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v5
      with:
        name: coverage
        path: .
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Check coverage file exists
      id: check_coverage
      run: |
        if ls *coverage*.xml 1> /dev/null 2>&1; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi
    - name: Post coverage comment
      if: steps.check_coverage.outputs.exists == 'true'
      run: |
        dotnet tool install --global dotnet-reportgenerator-globaltool
        reportgenerator -reports:*coverage*.xml -targetdir:report -reporttypes:MarkdownSummaryGithub
        cat report/SummaryGithub.md
    - name: Create PR comment
      if: steps.check_coverage.outputs.exists == 'true'
      uses: marocchino/sticky-pull-request-comment@v2.9.4
      with:
        header: code-coverage
        message: |
          ## Code Coverage (Unit Tests)

  update-readme:
    needs: coverage-report
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      actions: read
      contents: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        ref: main
        sparse-checkout: |
          README.md
        sparse-checkout-cone-mode: false
    - name: Download coverage artifacts
      uses: actions/download-artifact@v5
      with:
        name: coverage-unit
        path: .
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Update README with coverage
      run: |
        if ls *coverage*.xml 1> /dev/null 2>&1; then
          dotnet tool install --global dotnet-reportgenerator-globaltool
          reportgenerator -reports:*coverage*.xml -targetdir:report -reporttypes:MarkdownSummaryGithub
          COVERAGE_PCT=$(grep -oP '\d+(?=%)' report/SummaryGithub.md | head -1)
          
          cat > coverage_section.md << EOFMARKER
        ## Code Coverage

        <!-- coverage-table-start -->
        ![Code Coverage](https://img.shields.io/badge/coverage-${COVERAGE_PCT}%25-green)

        <!-- coverage-table-end -->
        EOFMARKER
          
          perl -0777 -pe 's/<!-- coverage-table-start -->.*?<!-- coverage-table-end -->/<!-- coverage-table-start -->/s' README.md > README.tmp
          sed -i '/<!-- coverage-table-start -->/r coverage_section.md' README.tmp
          sed -i '/<!-- coverage-table-start -->\s*$/d' README.tmp
          mv README.tmp README.md
          
          cat README.md
        else
          echo "Coverage file not found, skipping README update"
        fi
    - name: Commit and push
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add README.md
        git diff --staged --quiet || git commit -m "docs: update code coverage in README [skip ci]"
        git push
