# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
    paths-ignore: [ 'README.md' ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build -c Release
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            PopfileNet.**/bin/Release
            Tests/**/bin
          retention-days: 1

  test-unit-and-sonar:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .
      - name: Clean obj (fixes duplicate attributes)
        run: rm -rf Tests/IntegrationTests/obj Tests/FunctionalTests/obj
      - name: Install tools
        run: |
          dotnet tool install -g dotnet-coverage
          dotnet tool install --global dotnet-sonarscanner
      - name: Restore
        run: dotnet restore
      - name: Run unit tests with coverage
        run: |
          dotnet test PopfileNet.sln -c Release --no-build --filter "FullyQualifiedName~.UnitTests." --settings Tests/UnitTests/coverlet.runsettings --logger "console;verbosity=minimal" /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura /p:Threshold=0
      - name: Merge coverage files
        run: |
          mkdir -p ./TestResults/UnitTests
          dotnet-coverage merge "**/Tests/UnitTests/*/TestResults/*/coverage.cobertura.xml" -o ./TestResults/UnitTests/merged.cobertura.xml --output-format cobertura
          # Fix source paths in coverage report to match GitHub Actions workspace
          sed -i 's|<source>/Users/blakharaz/projects/dotnet/PopfileNet_clean/</source>|<source>.</source>|g' ./TestResults/UnitTests/merged.cobertura.xml
          sed -i 's|<source>/Users/blakharaz/projects/dotnet/PopfileNet_clean/PopfileNet.Common/</source>|<source>./PopfileNet.Common</source>|g' ./TestResults/UnitTests/merged.cobertura.xml
          ls -la ./TestResults/UnitTests/
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: TestResults/UnitTests/merged.cobertura.xml
          retention-days: 1
      - name: SonarCloud Scan
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin /k:"blakharaz_PopfileNet" /o:"blakharaz" /d:sonar.token="$SONAR_TOKEN" /d:sonar.coverageReportPaths="TestResults/UnitTests/merged.cobertura.xml" /d:sonar.projectBaseDir="$GITHUB_WORKSPACE" /d:sonar.exclusions="**/obj/**,**/bin/**,**/*.Tests/**,**/TestResults/**,.github/**,**/*.md" /d:sonar.coverage.exclusions="**/*.Tests/**,**/Migrations/**"
          dotnet build -c Release
          dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

  test-integration:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: .
    - name: Clean obj (fixes duplicate attributes)
      run: rm -rf Tests/IntegrationTests/obj Tests/FunctionalTests/obj
    - name: Restore
      run: dotnet restore
    - name: Run integration tests
      run: dotnet test Tests/IntegrationTests/PopfileNet.IntegrationTests.csproj -c Release --no-build --logger "console;verbosity=minimal" --results-directory ./TestResults/IntegrationTests

  test-functional:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: .
    - name: Clean obj (fixes duplicate attributes)
      run: rm -rf Tests/IntegrationTests/obj Tests/FunctionalTests/obj
    - name: Restore
      run: dotnet restore
    - name: Install Playwright browsers
      run: |
        npm install -g playwright
        npx playwright install chromium
    - name: Run functional tests
      run: dotnet test Tests/FunctionalTests/PopfileNet.FunctionalTests.csproj -c Release --no-build --logger "console;verbosity=minimal" --results-directory ./TestResults/FunctionalTests

  coverage-report:
    needs: test-unit-and-sonar
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Download unit coverage
      uses: actions/download-artifact@v4
      with:
        name: coverage-unit
        path: ./coverage-unit
    - name: Generate unit coverage report
      if: hashFiles('./coverage-unit/merged.cobertura.xml')
      run: |
        dotnet tool install --global dotnet-reportgenerator-globaltool
        reportgenerator -reports:'./coverage-unit/merged.cobertura.xml' -targetdir:coveragereport-unit -reporttypes:'Cobertura'
    - name: Code Coverage Summary (Unit Tests Only)
      if: hashFiles('./coverage-unit/merged.cobertura.xml')
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: ./coverage-unit/merged.cobertura.xml
        badge: true
        fail_below_min: true
        format: markdown
        hide_branch_rate: false
        hide_complexity: true
        indicators: true
        output: both
        thresholds: '12 80'
    - name: Upload unit coverage for PR
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: coverage
        path: ./coverage-unit/

  comment-pr:
    needs: coverage-report
    if: always() && github.event_name == 'pull_request'
    permissions:
      actions: read
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: coverage-unit
        path: .
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Check coverage file exists
      id: check_coverage
      run: |
        if ls *.cobertura.xml 1> /dev/null 2>&1; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi
    - name: Post coverage comment
      if: steps.check_coverage.outputs.exists == 'true'
      run: |
        dotnet tool install --global dotnet-reportgenerator-globaltool
        reportgenerator -reports:*.cobertura.xml -targetdir:report -reporttypes:MarkdownSummaryGithub
        {
          echo "## Code Coverage (Unit Tests)"
          echo ""
          cat report/SummaryGithub.md
        } > "$GITHUB_STEP_SUMMARY"
        {
          echo "<!-- popfilenet:coverage-unit -->"
          echo ""
          echo "## Code Coverage (Unit Tests)"
          echo ""
          cat report/SummaryGithub.md
        } > pr_comment.md
    - name: Create PR comment
      if: steps.check_coverage.outputs.exists == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const commentBody = fs.readFileSync('pr_comment.md', 'utf8');
          
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const prNumber = context.issue.number;
          
          const { data: comments } = await github.rest.issues.listComments({
            owner,
            repo,
            issue_number: prNumber
          });
          
          const existingComments = comments
            .filter(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('<!-- popfilenet:coverage-unit -->')
            )
            .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
          
          const existingComment = existingComments[0];
          
          if (existingComment) {
            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: existingComment.id,
              body: commentBody
            });
          } else {
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: commentBody
            });
          }

  update-readme:
    needs: coverage-report
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      actions: read
      contents: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        ref: main
        sparse-checkout: |
          README.md
        sparse-checkout-cone-mode: false
    - name: Download coverage artifacts
      uses: actions/download-artifact@v4
      with:
        name: coverage-unit
        path: .
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Update README with coverage
      run: |
        if ls *.cobertura.xml 1> /dev/null 2>&1; then
          dotnet tool install --global dotnet-reportgenerator-globaltool
          reportgenerator -reports:*.cobertura.xml -targetdir:report -reporttypes:MarkdownSummaryGithub
          COVERAGE_PCT=$(grep -oP '\d+(?=%)' report/SummaryGithub.md | head -1)
          
          cat > coverage_section.md << EOFMARKER
        ## Code Coverage

        <!-- coverage-table-start -->
        ![Code Coverage](https://img.shields.io/badge/coverage-${COVERAGE_PCT}%25-green)

        <!-- coverage-table-end -->
        EOFMARKER
          
          perl -0777 -pe 's/<!-- coverage-table-start -->.*?<!-- coverage-table-end -->/<!-- coverage-table-start -->/s' README.md > README.tmp
          sed -i '/<!-- coverage-table-start -->/r coverage_section.md' README.tmp
          sed -i '/<!-- coverage-table-start -->\s*$/d' README.tmp
          mv README.tmp README.md
          
          cat README.md
        else
          echo "Coverage file not found, skipping README update"
        fi
    - name: Commit and push
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add README.md
        git diff --staged --quiet || git commit -m "docs: update code coverage in README [skip ci]"
        git push
