# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
    paths-ignore: [ 'README.md' ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build --verbosity minimal --settings coverlet.runsettings --logger "console;verbosity=minimal"
    - name: Merge coverage files
      run: |
        dotnet tool install --global dotnet-coverage
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
        find . -path "*/TestResults/*" -name "coverage.cobertura.xml" -type f > coverage_files.txt
        if [ -s coverage_files.txt ]; then
          dotnet-coverage merge --input-files @"coverage_files.txt" -o merged.cobertura.xml -f cobertura
        else
          echo "No coverage files found"
        fi
    - name: Generate coverage report
      uses: danielpalme/ReportGenerator-GitHub-Action@5.4.7
      with:
        reports: '**/TestResults/**/coverage.cobertura.xml'
        targetdir: 'coveragereport'
        reporttypes: 'HtmlInline;Cobertura;MarkdownSummaryGithub'
    - name: Code Coverage Summary
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: merged.cobertura.xml
        badge: true
        fail_below_min: true
        format: markdown
        hide_branch_rate: false
        hide_complexity: true
        indicators: true
        output: both
        thresholds: '70 90'
    - name: Upload coverage for GitHub UI annotations
      uses: actions/upload-artifact@v4
      if: github.event_name == 'pull_request'
      with:
        name: coverage
        path: merged.cobertura.xml
    - name: Upload coverage artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-reports
        path: |
          **/TestResults/**/coverage.cobertura.xml
          merged.cobertura.xml
          code-coverage-results.md
    - name: Upload coverage report markdown
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: code-coverage-results.md
    - name: Upload detailed coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: detailed-coverage
        path: coveragereport/

  comment-pr:
    needs: build
    if: always() && github.event_name == 'pull_request'
    permissions:
      actions: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: coverage-report
    - uses: marocchino/sticky-pull-request-comment@v2.9.4
      with:
        path: code-coverage-results.md

  update-readme:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      actions: read
      contents: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: main
        sparse-checkout: |
          README.md
        sparse-checkout-cone-mode: false
    - name: Download coverage artifacts
      uses: actions/download-artifact@v4
      with:
        name: coverage-report
        path: .
    - name: Update README with coverage
      run: |
        if [ -f "code-coverage-results.md" ]; then
          COVERAGE_PCT=$(grep -E '^\|[^*]+\|' "code-coverage-results.md" | head -1 | awk -F'|' '{gsub(/ /,"",$3); print $3}')
          
          cat > coverage_section.md << EOFMARKER
        ## Code Coverage

        <!-- coverage-table-start -->
        ![Code Coverage](https://img.shields.io/badge/coverage-${COVERAGE_PCT}-green)

        <!-- coverage-table-end -->
        EOFMARKER
          
          perl -0777 -pe 's/<!-- coverage-table-start -->.*?<!-- coverage-table-end -->/<!-- coverage-table-start -->/s' README.md > README.tmp
          sed -i '/<!-- coverage-table-start -->/r coverage_section.md' README.tmp
          sed -i '/<!-- coverage-table-start -->\s*$/d' README.tmp
          mv README.tmp README.md
          
          cat README.md
        else
          echo "Coverage file not found, skipping README update"
        fi
    - name: Commit and push
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add README.md
        git diff --staged --quiet || git commit -m "docs: update code coverage in README [skip ci]"
        git push
