# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

permissions:
  contents: read
  actions: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build --verbosity minimal --collect:"XPlat Code Coverage"
    - name: Merge coverage files
      run: |
        dotnet tool install --global dotnet-coverage
        echo "$HOME/.dotnet/tools" >> $GITHUB_PATH
        find . -name "coverage.cobertura.xml" -type f > coverage_files.txt
        dotnet-coverage merge @"coverage_files.txt" -o merged.cobertura.xml -f cobertura
    - name: Code Coverage Report
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: merged.cobertura.xml
        badge: true
        fail_below_min: true
        format: markdown
        hide_branch_rate: false
        hide_complexity: true
        indicators: true
        output: both
        thresholds: '70 90'
    - name: Upload coverage artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: code-coverage-results.md

  comment-pr:
    needs: build
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      actions: read
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: coverage-report
    - uses: marocchino/sticky-pull-request-comment@v2.9.4
      with:
        path: code-coverage-results.md
